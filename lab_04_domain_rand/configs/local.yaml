training:
  headless: true
  device: cuda:0
  num_envs: 32
  num_training_episodes: 600
  max_episode_steps: 200
  seed: 42
  output_dir: outputs/lab_04
  vanilla_range_scale: 0.2

physics_randomization:
  mass_kg_range: [0.05, 0.3]
  friction_range: [0.4, 1.2]
  joint_damping_scale_range: [0.8, 1.2]
  actuator_stiffness_scale_range: [0.9, 1.1]

observation_noise:
  joint_pos_std_rad: 0.01
  joint_vel_std_rad_s: 0.05
  object_pose_std_m: 0.005

geometry_randomization:
  object_types: [cube, cylinder, sphere]
  size_m_range: [0.03, 0.08]

external_perturbation:
  interval_steps: 50
  force_n_range: [0.0, 2.0]

curriculum:
  success_window: 100
  widen_threshold: 0.8
  narrow_threshold: 0.5
  adjust_factor: 0.1
  min_scale: 0.6
  max_scale: 2.8

evaluation:
  episodes_per_config: 100
  chart_filename: robustness_comparison.svg
  dr_policy_name: domain_randomized
  vanilla_policy_name: vanilla_lab03
