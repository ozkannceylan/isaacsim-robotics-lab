runtime:
  headless: true
  device: cuda:0
  physics_dt: 0.0166666667
  render_interval: 1
  step_count: 300
  seed: 42

output:
  root_dir: lab_01_foundations/data/runs/local
  summary_filename: run_summary.json
  joint_state_filename: joint_states.csv
  frames_dirname: frames

scene:
  environment:
    usd_path: ${ISAAC_NUCLEUS_DIR}/Environments/Simple_Warehouse/warehouse.usd
    prim_path: /World/Warehouse
    translation: [0.0, 0.0, 0.0]
    orientation: [1.0, 0.0, 0.0, 0.0]
  robot:
    usd_path: ${ISAAC_NUCLEUS_DIR}/Robots/UniversalRobots/ur5e/ur5e.usd
    prim_path: "{ENV_REGEX_NS}/Robot"
    base_position: [0.55, 0.0, 0.82]
    base_orientation: [1.0, 0.0, 0.0, 0.0]
    joint_names:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    joint_amplitudes_rad: [0.35, 0.28, 0.22, 0.40, 0.25, 0.18]
    joint_phase_offsets_rad: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5]
    trajectory_frequency_hz: 0.25
  table:
    prim_path: /World/SupportTable
    position: [0.55, 0.0, 0.40]
    size: [1.20, 0.80, 0.80]
    color: [0.57, 0.43, 0.32]
  camera:
    prim_path: /World/InspectionCamera
    position: [-1.60, 0.0, 1.40]
    orientation: [1.0, 0.0, 0.0, 0.0]
    convention: world
    width: 640
    height: 480
    frame_count: 30
